<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#19a7ce">
  <meta name="description" content="A kid-friendly chore board for ages 2 through 18.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Kid Chore Board</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7fbf8;
      --panel: #ffffff;
      --ink: #21313c;
      --muted: #61717c;
      --primary: #19a7ce;
      --primary-dark: #107a98;
      --accent: #ff8f5f;
      --sun: #ffd166;
      --mint: #8bdcbe;
      --line: #dfe8ec;
      --danger: #b9364b;
      --done: #277243;
      --shadow: 0 18px 42px rgba(33, 49, 60, 0.14);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 8%, rgba(255, 209, 102, 0.42), transparent 30%),
        linear-gradient(155deg, #fff8e8 0%, #eafaff 50%, #f1fff6 100%);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 900;
      color: var(--ink);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:focus-visible,
    input:focus {
      outline: 4px solid rgba(25, 167, 206, 0.22);
      outline-offset: 2px;
    }

    input {
      width: 100%;
      min-height: 52px;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      background: #ffffff;
      color: var(--ink);
      font-size: 1rem;
      font-weight: 800;
    }

    label {
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 900;
    }

    .app {
      width: min(100%, 1060px);
      margin: 0 auto;
      padding: 20px 16px 88px;
    }

    .hero {
      display: grid;
      gap: 10px;
      padding: 18px 0;
    }

    .badge {
      display: inline-flex;
      width: max-content;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--primary-dark);
      font-size: 0.82rem;
      font-weight: 900;
      box-shadow: 0 8px 22px rgba(16, 122, 152, 0.1);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.35rem, 11vw, 4.8rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .intro,
    .help-text,
    .message,
    .muted {
      color: var(--muted);
      line-height: 1.45;
    }

    .intro {
      max-width: 58ch;
      font-size: 1.02rem;
    }

    .layout {
      display: grid;
      gap: 14px;
    }

    .panel,
    .kid-card,
    .board,
    .leaderboard,
    .empty-state {
      border: 1px solid rgba(223, 232, 236, 0.92);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .panel {
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .field-grid,
    .action-row,
    .kid-grid,
    .board-grid,
    .leader-list {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .action-row {
      grid-template-columns: 1fr;
    }

    .primary {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(25, 167, 206, 0.25);
    }

    .secondary {
      background: var(--sun);
    }

    .ghost {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
    }

    .message {
      min-height: 1.3em;
      font-weight: 900;
    }

    .message.error {
      color: var(--danger);
    }

    .dashboard {
      display: grid;
      gap: 14px;
    }

    .section-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }

    .section-header h2 {
      font-size: 1.35rem;
      line-height: 1.1;
    }

    .kid-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      text-align: left;
    }

    .kid-card.active {
      border-color: var(--primary);
      box-shadow: inset 0 0 0 2px rgba(25, 167, 206, 0.18), var(--shadow);
    }

    .kid-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .kid-name {
      font-size: 1.35rem;
      font-weight: 950;
    }

    .pill {
      display: inline-flex;
      width: max-content;
      align-items: center;
      border-radius: 999px;
      padding: 6px 9px;
      background: #eaf7fb;
      color: var(--primary-dark);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .progress-track {
      overflow: hidden;
      height: 12px;
      border-radius: 999px;
      background: #e9f1f4;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 220ms ease;
    }

    .board {
      display: grid;
      gap: 14px;
      padding: 14px;
      animation: reveal 260ms ease both;
    }

    .board-head {
      display: grid;
      gap: 8px;
    }

    .board-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .board-title-row h2 {
      font-size: clamp(1.6rem, 7vw, 2.7rem);
      line-height: 1;
    }

    .tab-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .tab {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      min-height: 44px;
    }

    .tab.active {
      border-color: var(--primary);
      background: #dff7ff;
      color: var(--primary-dark);
    }

    .chore-list {
      display: grid;
      gap: 10px;
    }

    .chore-item {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
    }

    .chore-item.done {
      background: #f3fbf5;
      border-color: #cae9d2;
    }

    .chore-main {
      display: grid;
      gap: 6px;
    }

    .chore-name {
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .chore-item.done .chore-name {
      color: var(--muted);
      text-decoration: line-through;
    }

    .chore-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .assign {
      background: #eaf7fb;
      color: var(--primary-dark);
    }

    .complete {
      background: #edf9ee;
      color: var(--done);
    }

    .complete[disabled] {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    .remove {
      background: #fff0e8;
      color: #934326;
    }

    .leaderboard {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .leader-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid #edf2f4;
      padding-top: 10px;
      font-weight: 900;
    }

    .empty-state {
      display: grid;
      gap: 8px;
      padding: 18px;
    }

    .hidden {
      display: none;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 720px) {
      .app {
        padding: 34px 24px 64px;
      }

      .field-grid {
        grid-template-columns: 1.5fr 0.65fr 0.7fr 0.8fr;
        align-items: end;
      }

      .action-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .kid-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .board-grid {
        grid-template-columns: 1.45fr 0.8fr;
        align-items: start;
      }

      .chore-item {
        grid-template-columns: 1fr 220px;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="app-title">
      <div class="badge">Up to 10 kids</div>
      <h1 id="app-title">Kid Chore Board</h1>
      <p class="intro">A mobile-first chore board for assigning age-right jobs, tracking completion, and working toward a family prize.</p>
    </section>

    <section class="layout" aria-label="Family chore manager">
      <form class="panel" id="setup-form" novalidate>
        <div class="field-grid">
          <div class="field">
            <label for="kid-name">Kid name</label>
            <input id="kid-name" maxlength="32" autocomplete="off" placeholder="Sawyer">
          </div>
          <div class="field">
            <label for="kid-age">Age</label>
            <input id="kid-age" type="number" min="2" max="18" inputmode="numeric" placeholder="7">
          </div>
          <div class="field">
            <label for="reward-goal">Goal</label>
            <input id="reward-goal" type="number" min="1" max="200" inputmode="numeric" placeholder="25">
          </div>
          <div class="field">
            <label for="prize-input">Prize</label>
            <input id="prize-input" maxlength="40" placeholder="Ice cream">
          </div>
        </div>

        <div class="action-row">
          <button class="primary" type="submit">Add Kid</button>
          <button class="secondary" type="button" id="demo-button">Load Demo Family</button>
          <button class="ghost" type="button" id="clear-progress-button">Clear Points</button>
        </div>

        <p class="message" id="message" role="status" aria-live="polite"></p>
      </form>

      <section class="dashboard" aria-label="Kids dashboard">
        <div class="section-header">
          <h2>Kids</h2>
          <span class="pill" id="kid-count">0/10</span>
        </div>
        <div class="kid-grid" id="kid-grid"></div>
      </section>

      <section class="board-grid">
        <section class="board hidden" id="kid-board" aria-live="polite"></section>
        <section class="leaderboard" id="leaderboard" aria-label="Leaderboard"></section>
      </section>

      <section class="empty-state" id="empty-state">
        <h2>Start with your first kid.</h2>
        <p>Add a name and age, or load the demo family to see how assignment, completion, points, and rewards work.</p>
      </section>
    </section>
  </main>

  <script>
    const chorePlans = {
      "2-3": {
        label: "Ages 2-3",
        note: "Best as short helping jobs with an adult right there. Skip breakables, chemicals, hot items, cords, and heavy water.",
        daily: ["Put toys in bins", "Put dirty clothes in hamper", "Help wipe small spills", "Bring napkins to the table", "Help feed pet with pre-measured food"],
        weekly: ["Help sort socks", "Help dust low surfaces with a cloth", "Water plants with a small cup"],
        monthly: ["Help carry light items", "Help sort recycling by type", "Help choose toys for a tidy bin"]
      },
      "4-5": {
        label: "Ages 4-5",
        note: "Preschoolers can finish simple routines, but tableware, pets, outdoor jobs, and cleaning still need adult setup.",
        daily: ["Make bed roughly", "Clear own plate", "Put shoes and coat away", "Set table with safe items", "Pick up toys"],
        weekly: ["Match socks", "Fold washcloths", "Wipe table", "Help load plastic dishes", "Pull small weeds with adult help"],
        monthly: ["Help wash lower car panels", "Organize toy bins", "Help pack donation items"]
      },
      "6-8": {
        label: "Ages 6-8",
        note: "Keep chores concrete and visible. Kids this age usually do best with short checklists and tools sized for them.",
        daily: ["Make bed", "Clear table", "Pack or unpack backpack", "Put laundry away", "Brush or feed pet with guidance"],
        weekly: ["Sweep small areas", "Vacuum simple rooms", "Fold laundry", "Empty small trash cans", "Help prepare simple snacks"],
        monthly: ["Clean under bed", "Sort closet or drawers", "Wipe reachable windows", "Wipe baseboards"]
      },
      "9-10": {
        label: "Ages 9-10",
        note: "Add independence, but keep knives, heat, chemicals, heavy trash, and appliances limited to trained tasks.",
        daily: ["Reset bedroom", "Feed and water pet", "Prep simple lunch items", "Load or unload safe dishwasher items", "Put belongings away"],
        weekly: ["Vacuum or mop one area", "Take out light trash or recycling", "Wipe bathroom sink and mirror", "Help cook a simple meal", "Dust shelves and low furniture"],
        monthly: ["Clean bedroom deeply", "Sort pantry items", "Wash car with adult nearby", "Help clean appliance fronts"]
      },
      "11-12": {
        label: "Ages 11-12",
        note: "Good age for multi-step chores after training. Cleaning products, yard tools, cooking heat, and childcare still need clear rules.",
        daily: ["Manage bedroom reset", "Start personal laundry steps", "Prepare simple meals or snacks", "Care for pets", "Clean kitchen after snack or meal"],
        weekly: ["Clean bathroom with safe products", "Change sheets", "Vacuum or mop floors", "Help with yard work after training", "Take out trash and recycling"],
        monthly: ["Organize books and school supplies", "Clean windows at reachable height", "Help clean out fridge", "Help with seasonal yard cleanup"]
      },
      "13-15": {
        label: "Ages 13-15",
        note: "Teens can own bigger routines, but chemicals, blades, heat, lawn equipment, ladders, and sibling care need training and boundaries.",
        daily: ["Handle personal laundry", "Cook or assemble a basic meal", "Clean kitchen after use", "Keep room clean", "Help with pets"],
        weekly: ["Clean bathroom", "Vacuum and mop floors", "Take out trash and recycling", "Help plan meals", "Do trained lawn or yard work"],
        monthly: ["Deep clean room", "Help organize garage or basement", "Clean bathroom thoroughly", "Restock household supplies"]
      },
      "16-18": {
        label: "Ages 16-18",
        note: "Older teens can handle adult-like chores when trained. Driving errands, power tools, harsh cleaners, ladders, and childcare still depend on maturity and local rules.",
        daily: ["Maintain personal space", "Do personal laundry", "Prepare meals", "Clean shared kitchen areas", "Handle approved errands if licensed"],
        weekly: ["Clean shared bathrooms", "Help grocery shop or manage the list", "Wash car", "Do yard work", "Cook a family meal"],
        monthly: ["Lead a decluttering project", "Deep clean bedroom", "Clean appliances with approved products", "Help with family meal rotation", "Review and restock supplies"]
      }
    };

    const sections = [
      { key: "daily", title: "Daily", icon: "☀️", points: 1 },
      { key: "weekly", title: "Weekly", icon: "🧺", points: 3 },
      { key: "monthly", title: "Monthly", icon: "🧽", points: 5 }
    ];

    const form = document.querySelector("#setup-form");
    const kidNameInput = document.querySelector("#kid-name");
    const kidAgeInput = document.querySelector("#kid-age");
    const rewardGoalInput = document.querySelector("#reward-goal");
    const prizeInput = document.querySelector("#prize-input");
    const message = document.querySelector("#message");
    const kidCount = document.querySelector("#kid-count");
    const kidGrid = document.querySelector("#kid-grid");
    const kidBoard = document.querySelector("#kid-board");
    const leaderboard = document.querySelector("#leaderboard");
    const emptyState = document.querySelector("#empty-state");
    const demoButton = document.querySelector("#demo-button");
    const clearProgressButton = document.querySelector("#clear-progress-button");
    const maxKids = 10;
    const stateKey = "kid-chore-board-state-v2";
    const defaultState = {
      kids: [],
      selectedKidId: "",
      activePeriod: "daily",
      rewardGoal: 25,
      prize: "Ice cream",
      assignments: {},
      completions: {}
    };
    let state = loadState();

    function loadState() {
      try {
        return { ...defaultState, ...JSON.parse(localStorage.getItem(stateKey)) };
      } catch {
        return { ...defaultState };
      }
    }

    function saveState() {
      localStorage.setItem(stateKey, JSON.stringify(state));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[character]);
    }

    function getRangeForAge(age) {
      if (age >= 2 && age <= 3) return "2-3";
      if (age >= 4 && age <= 5) return "4-5";
      if (age >= 6 && age <= 8) return "6-8";
      if (age >= 9 && age <= 10) return "9-10";
      if (age >= 11 && age <= 12) return "11-12";
      if (age >= 13 && age <= 15) return "13-15";
      if (age >= 16 && age <= 18) return "16-18";
      return null;
    }

    function setMessage(text = "", type = "") {
      message.textContent = text;
      message.className = `message${type ? ` ${type}` : ""}`;
    }

    function makeId(name) {
      return `${name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "")}-${Date.now().toString(36)}`;
    }

    function getSelectedKid() {
      return state.kids.find((kid) => kid.id === state.selectedKidId) || state.kids[0] || null;
    }

    function syncRewardSettings() {
      const goal = Number(rewardGoalInput.value);
      state.rewardGoal = Number.isInteger(goal) && goal > 0 ? goal : 25;
      state.prize = prizeInput.value.trim() || "a prize";
    }

    function getChoreId(kid, period, index) {
      return `${kid.rangeKey}:${period}:${index}`;
    }

    function getKidAssignments(kid) {
      return state.assignments[kid.id] || {};
    }

    function getKidCompletions(kid) {
      return state.completions[kid.id] || {};
    }

    function getChorePoints(period) {
      return sections.find((section) => section.key === period)?.points || 1;
    }

    function getStats(kid) {
      const assignments = getKidAssignments(kid);
      const completions = getKidCompletions(kid);
      const assignedIds = Object.keys(assignments).filter((id) => assignments[id]);
      const doneIds = assignedIds.filter((id) => completions[id]);
      const points = doneIds.reduce((total, choreId) => total + getChorePoints(choreId.split(":")[1]), 0);
      return { assigned: assignedIds.length, done: doneIds.length, points };
    }

    function addKid(name, age) {
      const trimmedName = name.trim();
      const parsedAge = Number(age);
      const rangeKey = getRangeForAge(parsedAge);

      if (!trimmedName) {
        setMessage("Add a kid name first.", "error");
        return;
      }

      if (state.kids.length >= maxKids) {
        setMessage(`Kid Chore Board supports up to ${maxKids} kids.`, "error");
        return;
      }

      if (!Number.isInteger(parsedAge) || !rangeKey) {
        setMessage("Age needs to be a whole number from 2 through 18.", "error");
        return;
      }

      if (state.kids.some((kid) => kid.name.toLowerCase() === trimmedName.toLowerCase())) {
        setMessage(`${trimmedName} is already on the board.`, "error");
        return;
      }

      const kid = { id: makeId(trimmedName), name: trimmedName, age: parsedAge, rangeKey };
      state.kids.push(kid);
      state.selectedKidId = kid.id;
      state.assignments[kid.id] = {};
      state.completions[kid.id] = {};
      kidNameInput.value = "";
      kidAgeInput.value = "";
      setMessage(`${kid.name} added.`);
      saveState();
      render();
    }

    function render() {
      rewardGoalInput.value = state.rewardGoal;
      prizeInput.value = state.prize;
      kidCount.textContent = `${state.kids.length}/${maxKids}`;
      renderKids();
      renderBoard();
      renderLeaderboard();
      emptyState.classList.toggle("hidden", state.kids.length > 0);
    }

    function renderKids() {
      if (!state.kids.length) {
        kidGrid.innerHTML = "";
        return;
      }

      kidGrid.innerHTML = state.kids.map((kid) => {
        const stats = getStats(kid);
        const percent = Math.min(100, Math.round((stats.points / state.rewardGoal) * 100));
        const plan = chorePlans[kid.rangeKey];
        return `
          <button class="kid-card ${kid.id === state.selectedKidId ? "active" : ""}" type="button" data-action="select-kid" data-kid-id="${kid.id}">
            <span class="kid-card-top">
              <span>
                <span class="kid-name">${escapeHtml(kid.name)}</span>
                <span class="muted">Age ${kid.age} · ${plan.label}</span>
              </span>
              <span class="pill">${stats.points}/${state.rewardGoal}</span>
            </span>
            <span class="progress-track" aria-hidden="true"><span class="progress-fill" style="width: ${percent}%"></span></span>
            <span class="muted">${stats.done} of ${stats.assigned} assigned chores complete</span>
          </button>
        `;
      }).join("");
    }

    function renderBoard() {
      const kid = getSelectedKid();
      if (!kid) {
        kidBoard.classList.add("hidden");
        kidBoard.innerHTML = "";
        return;
      }

      state.selectedKidId = kid.id;
      const plan = chorePlans[kid.rangeKey];
      const activeSection = sections.find((section) => section.key === state.activePeriod) || sections[0];
      const chores = plan[activeSection.key];
      const stats = getStats(kid);

      kidBoard.classList.remove("hidden");
      kidBoard.innerHTML = `
        <div class="board-head">
          <div class="board-title-row">
            <h2>${escapeHtml(kid.name)}</h2>
            <span class="pill">Age ${kid.age}</span>
          </div>
          <p class="muted">${plan.note}</p>
          <p class="muted">${stats.done} done · ${stats.assigned} assigned · ${stats.points} points</p>
        </div>
        <div class="tab-row" role="tablist" aria-label="Chore frequency">
          ${sections.map((section) => `
            <button class="tab ${section.key === activeSection.key ? "active" : ""}" type="button" data-action="set-period" data-period="${section.key}">
              ${section.title}
            </button>
          `).join("")}
        </div>
        <div class="chore-list">
          ${chores.map((chore, index) => getChoreMarkup(kid, activeSection, chore, index)).join("")}
        </div>
      `;
    }

    function getChoreMarkup(kid, section, chore, index) {
      const choreId = getChoreId(kid, section.key, index);
      const assigned = Boolean(getKidAssignments(kid)[choreId]);
      const done = Boolean(getKidCompletions(kid)[choreId]);
      return `
        <article class="chore-item ${done ? "done" : ""}">
          <div class="chore-main">
            <span class="chore-name">${escapeHtml(chore)}</span>
            <span class="muted">${section.points} point${section.points === 1 ? "" : "s"} · ${assigned ? done ? "Complete" : "Assigned" : "Not assigned"}</span>
          </div>
          <div class="chore-actions">
            <button class="${assigned ? "remove" : "assign"}" type="button" data-action="toggle-assign" data-kid-id="${kid.id}" data-chore-id="${choreId}">
              ${assigned ? "Unassign" : "Assign"}
            </button>
            <button class="complete" type="button" data-action="toggle-complete" data-kid-id="${kid.id}" data-chore-id="${choreId}" ${assigned ? "" : "disabled"}>
              ${done ? "Undo" : "Complete"}
            </button>
          </div>
        </article>
      `;
    }

    function renderLeaderboard() {
      const leaders = [...state.kids]
        .map((kid) => ({ kid, stats: getStats(kid) }))
        .sort((a, b) => b.stats.points - a.stats.points || a.kid.name.localeCompare(b.kid.name));

      leaderboard.innerHTML = `
        <h2>Leaderboard</h2>
        <p class="muted">Prize: ${escapeHtml(state.prize || "a prize")}</p>
        <div class="leader-list">
          ${leaders.length ? leaders.map((leader, index) => `
            <div class="leader-row">
              <span>${index + 1}. ${escapeHtml(leader.kid.name)}</span>
              <span>${leader.stats.points}/${state.rewardGoal}</span>
            </div>
          `).join("") : "<p class=\"muted\">Add kids to start tracking points.</p>"}
        </div>
      `;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      syncRewardSettings();
      addKid(kidNameInput.value, kidAgeInput.value);
    });

    demoButton.addEventListener("click", () => {
      state = {
        ...defaultState,
        rewardGoal: 25,
        prize: "Ice cream",
        kids: [
          { id: "sawyer-demo", name: "Sawyer", age: 7, rangeKey: "6-8" },
          { id: "emmett-demo", name: "Emmett", age: 9, rangeKey: "9-10" },
          { id: "landon-demo", name: "Landon", age: 15, rangeKey: "13-15" }
        ],
        selectedKidId: "sawyer-demo",
        activePeriod: "daily",
        assignments: { "sawyer-demo": {}, "emmett-demo": {}, "landon-demo": {} },
        completions: { "sawyer-demo": {}, "emmett-demo": {}, "landon-demo": {} }
      };
      setMessage("Demo family loaded.");
      saveState();
      render();
    });

    clearProgressButton.addEventListener("click", () => {
      state.completions = {};
      state.kids.forEach((kid) => {
        state.completions[kid.id] = {};
      });
      setMessage("Points cleared.");
      saveState();
      render();
    });

    kidGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action='select-kid']");
      if (!button) return;
      state.selectedKidId = button.dataset.kidId;
      saveState();
      render();
    });

    kidBoard.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.dataset.action;

      if (action === "set-period") {
        state.activePeriod = button.dataset.period;
        saveState();
        render();
        return;
      }

      const kidId = button.dataset.kidId;
      const choreId = button.dataset.choreId;
      state.assignments[kidId] = state.assignments[kidId] || {};
      state.completions[kidId] = state.completions[kidId] || {};

      if (action === "toggle-assign") {
        state.assignments[kidId][choreId] = !state.assignments[kidId][choreId];
        if (!state.assignments[kidId][choreId]) delete state.completions[kidId][choreId];
      }

      if (action === "toggle-complete" && state.assignments[kidId][choreId]) {
        state.completions[kidId][choreId] = !state.completions[kidId][choreId];
      }

      saveState();
      render();
    });

    rewardGoalInput.addEventListener("change", () => {
      syncRewardSettings();
      saveState();
      render();
    });

    prizeInput.addEventListener("change", () => {
      syncRewardSettings();
      saveState();
      render();
    });

    render();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
